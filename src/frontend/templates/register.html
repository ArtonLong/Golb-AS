<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/frontend/static/css/style.css">
    <title>{{ .title }}</title>
</head>
<body>

    <main class="auth-container">
        <h2 style="font-family: Georgia, serif; margin-top: 0; margin-bottom: 24px;">Create an Account</h2>
        
        <div id="alert" class="alert-box alert-error"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>

            <button type="submit" class="action-btn" style="width: 100%; margin-top: 10px; margin-bottom: 0;">Register</button>
        </form>

        <div class="form-footer">
            Already have an account? <a href="login">Log in instead</a>
        </div>
    </main>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alert');
            alertBox.style.display = 'none';

            const formData = new URLSearchParams(new FormData(e.target));

            try {
                const response = await fetch('register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    // Automatically route them to login upon successful registration
                    window.location.href = 'login?registered=true';
                } else {
                    const data = await response.json();
                    alertBox.textContent = data.error || 'Registration failed';
                    alertBox.style.display = 'block';
                }
            } catch (err) {
                alertBox.textContent = 'Server connection error.';
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
